# Viewport LLC deploy overlay for self-hosted Supabase.
#
# This file is an OVERRIDE layer applied ON TOP OF the upstream base compose at
# docker/docker-compose.yml. It does NOT redefine services from scratch.
#
# Purpose (per viewport-ops guardrails for the gated internal-only stage):
#   - Bind every host-published port to the loopback interface (127.0.0.1) ONLY,
#     so nothing reaches the public edge. NO :80 / :443, NO DNS, NO Traefik labels.
#   - Verification is internal-only: curl 127.0.0.1:8000 (Kong/Studio),
#     pg_isready against 127.0.0.1:5432 / :6543 (Supavisor).
#
# Usage (manual, on the NEW engine):
#   export DOCKER_HOST=unix:///var/run/docker-viewport.sock
#   cd docker
#   docker compose --env-file .env \
#     -f docker-compose.yml \
#     -f ../deploy/docker-compose.yml \
#     up -d
#
# Base compose is the source of truth for images, healthchecks, depends_on,
# volumes and env. Only the public exposure surface is narrowed here.
#
# Deploy the BASE compose ONLY. Do NOT chain docker-compose.logs.yml /
# docker-compose.s3.yml / proxy overlays. The base compose has no analytics /
# vector service (moved to the optional logs overlay upstream), which removes the
# classic "stack hangs waiting for analytics health" failure.

services:
  kong:
    ports:
      # Single API front door (Studio, REST, Auth, Storage, Realtime, Functions).
      # Loopback-only for the gated internal stage.
      - "127.0.0.1:${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "127.0.0.1:${KONG_HTTPS_PORT:-8443}:8443/tcp"

  supavisor:
    ports:
      # Connection pooler: session (5432) + transaction (6543), loopback-only.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
      - "127.0.0.1:${POOLER_PROXY_PORT_TRANSACTION:-6543}:6543"
