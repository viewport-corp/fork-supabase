# Viewport LLC — single-file deploy entrypoint for self-hosted Supabase (#410).
#
# Dokploy runs ONE compose file via an explicit \"-f <composePath>\", which makes
# the COMPOSE_FILE env chain and a separate -f overlay ineffective. So this file
# pulls in the upstream base via Compose \"include:\" and then REPLACES the two
# host-published port lists with loopback-only bindings using \"ports: !override\"
# (a plain merge would APPEND, leaving the public 0.0.0.0 mapping in place).
#
# include: resolves the base file relative to ITS OWN dir, so all base bind mounts
# (volumes/api/kong.yml, volumes/db/*, volumes/pooler/pooler.exs, ...) correctly
# point at the docker/ tree. Base compose stays the untouched source of truth.
#
# Port env vars MUST be bare numbers (POSTGRES_PORT=5432, ...): POSTGRES_PORT is
# also Postgres PGPORT and every internal db URL, so a host-IP prefix breaks db
# init. Loopback is applied ONLY here, on the host mapping.
#
# Dokploy: sourceType git, composePath deploy/docker-compose.deploy.yml.
# Internal-only: kong 127.0.0.1:8000/8443, supavisor 127.0.0.1:5432/6543.
include:
  - ../docker/docker-compose.yml
services:
  kong:
    ports: !override
      - "127.0.0.1:${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "127.0.0.1:${KONG_HTTPS_PORT:-8443}:8443/tcp"
  supavisor:
    ports: !override
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
      - "127.0.0.1:${POOLER_PROXY_PORT_TRANSACTION:-6543}:6543"
